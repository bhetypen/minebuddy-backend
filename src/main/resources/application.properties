spring.application.name=minebuddy

server.port=${SERVER_PORT:8083}

spring.datasource.url=${DB_URL:jdbc:mariadb://localhost:3312/minebuddy_db}
spring.datasource.username=${DB_USERNAME:minebuddy}
spring.datasource.password=${DB_PASSWORD:minebuddy}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=${SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

springdoc.api-docs.enabled=${SWAGGER_ENABLED:true}
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:true}

logging.level.root=${LOG_LEVEL:INFO}

app.jwt.secret=${JWT_SECRET:dev_only_secret_change_in_prod_at_least_32_chars_long}
app.jwt.expiry-hours=${JWT_EXPIRY_HOURS:8}

app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:4200}